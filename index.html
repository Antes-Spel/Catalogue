<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes-Spel | Official Catalogue</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <section id="games" class="games">
        <div class="container">
            <div class="game-grid">

                <!-- Balloon Pop Card -->
                <div class="game-card">
                    <div class="game-info">
                        <h3>Balloon Pop</h3>
                        <p class="game-tagline">Fun Arcade-like Balloon popping game.</p>
                        <div class="game-links">
                            <a href="Balloon%20Pop/PRIVACY.md" class="btn-secondary">Privacy Policy</a>
                            <span class="badge build-status">Ready for TestFlight</span>
                        </div>
                    </div>
                </div>

                <!-- Sudoku Card -->
                <div class="game-card">
                    <div class="game-info">
                        <h3>Sudoku</h3>
                        <p class="game-tagline">Classic number puzzle. Three difficulties. Zero data collection.</p>
                        <div class="game-links">
                            <a href="Sudoku/PRIVACY.md" class="btn-secondary">Privacy Policy</a>
                            <a href="Sudoku/SUPPORT.md" class="btn-secondary">Support</a>
                            <span class="badge build-status">Preparing Launch</span>
                        </div>
                    </div>
                </div>

                <!-- Yatzy Card -->
                <div class="game-card future">
                    <div class="game-info">
                        <h3>Yatzy</h3>
                        <p class="game-tagline">Classic Yatzy game</p>
                        <div class="game-links">
                            <span class="badge dev-status">In Development</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">

        </div>
    </footer>
</body>

</html>
