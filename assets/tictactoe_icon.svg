<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Wooden Background -->
  <rect width="1024" height="1024" fill="#D2B48C" rx="100"/>
  <rect x="20" y="20" width="984" height="984" fill="none" stroke="#8B4513" stroke-width="20" rx="80"/>
  
  <!-- Board Lines -->
  <line x1="341" y1="50" x2="341" y2="974" stroke="#8B4513" stroke-width="15"/>
  <line x1="682" y1="50" x2="682" y2="974" stroke="#8B4513" stroke-width="15"/>
  <line x1="50" y1="341" x2="974" y2="341" stroke="#8B4513" stroke-width="15"/>
  <line x1="50" y1="682" x2="974" y2="682" stroke="#8B4513" stroke-width="15"/>

  <!-- Helper for placing pieces -->
  <!-- O in corners and center (Cross pattern) -->
  <!-- Top-Left (0,0) -->
  <circle cx="170" cy="170" r="100" stroke="blue" stroke-width="40" fill="none"/>
  <!-- Top-Right (0,2) -->
  <circle cx="854" cy="170" r="100" stroke="blue" stroke-width="40" fill="none"/>
  <!-- Center (1,1) -->
  <circle cx="512" cy="512" r="100" stroke="blue" stroke-width="40" fill="none"/>
  <!-- Bottom-Left (2,0) -->
  <circle cx="170" cy="854" r="100" stroke="blue" stroke-width="40" fill="none"/>
  <!-- Bottom-Right (2,2) -->
  <circle cx="854" cy="854" r="100" stroke="blue" stroke-width="40" fill="none"/>

  <!-- X in remaining cells -->
  <!-- Top-Middle (0,1) -->
  <line x1="432" y1="90" x2="592" y2="250" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <line x1="592" y1="90" x2="432" y2="250" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <!-- Middle-Left (1,0) -->
  <line x1="90" y1="432" x2="250" y2="592" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <line x1="250" y1="432" x2="90" y2="592" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <!-- Middle-Right (1,2) -->
  <line x1="774" y1="432" x2="934" y2="592" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <line x1="934" y1="432" x2="774" y2="592" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <!-- Bottom-Middle (2,1) -->
  <line x1="432" y1="774" x2="592" y2="934" stroke="red" stroke-width="40" stroke-linecap="round"/>
  <line x1="592" y1="774" x2="432" y2="934" stroke="red" stroke-width="40" stroke-linecap="round"/>
</svg>